# ABIS local dev services. Host port 5433 for Postgres on purpose:
# many dev machines (incl. the project workstation) already run a
# PostgreSQL on 5432. See .ai/sessions/2026-07-04-t001-backend-scaffold.md.
services:
  db:
    image: postgres:16
    container_name: abis-db
    environment:
      POSTGRES_USER: abis
      POSTGRES_PASSWORD: abis
      POSTGRES_DB: abis
    ports:
      - "5433:5432"
    volumes:
      - abis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abis -d abis"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7
    container_name: abis-redis
    ports:
      - "6379:6379"
    volumes:
      - abis_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  abis_pgdata:
  abis_redisdata:
